<!DOCTYPE html>
<html>
<head>
    <title>Enroll User</title>
    <link rel="stylesheet" href="/static/style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
            color: white;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: white;
            color: #333;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            background: #f0f0f0;
        }

        /* Message Styling */
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            animation: slideFade 0.5s ease;
        }

        .green {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid #2ecc71;
            color: #2ecc71;
        }

        .red {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }

        .orange {
            background: rgba(241, 196, 15, 0.2);
            border: 1px solid #f1c40f;
            color: #f1c40f;
        }

        .link {
            display: inline-block;
            margin-top: 15px;
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.9;
            transition: 0.3s;
        }

        .link:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .hint {
            font-size: 12px;
            margin-top: 10px;
            opacity: 0.8;
        }

        /* Animations */
        @keyframes slideFade {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>📸 Enroll New User</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Enter username" required>
        <button type="submit">Capture Face</button>
    </form>

    {% if message %}
        <p class="message {{color}}">
            {{ message }}
        </p>
    {% endif %}

    <div class="hint">
        Press SPACE to capture your face during enrollment
    </div>

    <a href="/" class="link">⬅ Back to login</a>
</div>

</body>
</html>
