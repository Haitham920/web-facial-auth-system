<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FaceAuth — Login</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="page-wrapper">

    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24">
          <path d="M9 3H5a2 2 0 0 0-2 2v4"/>
          <path d="M15 3h4a2 2 0 0 1 2 2v4"/>
          <path d="M9 21H5a2 2 0 0 1-2-2v-4"/>
          <path d="M15 21h4a2 2 0 0 0 2-2v-4"/>
          <circle cx="12" cy="10" r="3"/>
          <path d="M7 17s1.5-2 5-2 5 2 5 2"/>
        </svg>
      </div>
      <div class="brand-name">FaceAuth</div>
      <div class="brand-tagline">Biometric Authentication</div>
    </div>

    <div class="card">
      <h1 class="card-title">Welcome back</h1>
      <p class="card-subtitle">Enter your username, then click Login — a camera window will open for face capture.</p>

      {% if message %}
        <div class="alert alert-{{ color }}">
          {% if color == "green" %}
            <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          {% else %}
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          {% endif %}
          {{ message }}
        </div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username"/>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top: 0.5rem;">
          <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Login with Face
        </button>
      </form>
    </div>

    <p class="page-footer">
      New user? <a href="/enroll">Enroll your face</a>
    </p>

  </div>

</body>
</html>
